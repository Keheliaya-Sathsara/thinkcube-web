<header 
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [class.bg-tc-black]="isScrolled() && isDarkMode() === 'dark'"
  [class.bg-white]="isScrolled() && isDarkMode() === 'light'"
  [class.shadow-lg]="isScrolled()"
  [class.backdrop-blur-md]="isScrolled()"
  [class.py-3]="!isScrolled()"
  [class.sm:py-4]="!isScrolled()"
  [class.py-2]="isScrolled()"
  [class.sm:py-3]="isScrolled()">
  
  <nav class="container mx-auto px-4 sm:px-6 lg:px-12">
    <div class="flex items-center justify-between">
      <a href="#home" (click)="scrollToSection('#home')" class="relative z-10">
        <img 
          src="assets/images/Think Cube logo.png" 
          alt="ThinkCube Logo" 
          class="h-8 sm:h-10 md:h-12 w-auto transition-transform duration-300 hover:scale-105" />
      </a>

      <div class="hidden md:flex items-center gap-4 lg:gap-8 xl:gap-12">
        @for (link of navLinks; track link.label) {
          <a 
            [href]="link.href"
            (click)="scrollToSection(link.href)"
            class="nav-link text-xs lg:text-sm"
            [class.text-tc-dark]="isDarkMode() === 'light'"
            [class.text-tc-white]="isDarkMode() === 'dark'">
            {{ link.label }}
          </a>
        }
      </div>

      <div class="hidden md:flex items-center gap-4">
        <!-- Theme Toggle Button -->
        <button 
          (click)="toggleTheme()"
          class="relative p-2 rounded-full transition-all duration-300 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-tc-green"
          [class.bg-tc-dark]="isDarkMode() === 'dark'"
          [class.bg-tc-light-gray]="isDarkMode() === 'light'"
          [attr.aria-label]="isDarkMode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
          <!-- Sun Icon (shown in dark mode) -->
          <svg 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="2" 
            stroke="currentColor" 
            class="w-5 h-5 transition-all duration-300"
            [class.text-tc-orange]="isDarkMode() === 'dark'"
            [class.hidden]="isDarkMode() === 'light'">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
          <!-- Moon Icon (shown in light mode) -->
          <svg 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="2" 
            stroke="currentColor" 
            class="w-5 h-5 transition-all duration-300"
            [class.text-tc-dark]="isDarkMode() === 'light'"
            [class.hidden]="isDarkMode() === 'dark'">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        </button>

        <a 
          href="#contact" 
          (click)="scrollToSection('#contact')"
          class="btn-primary text-[10px] lg:text-xs px-4 lg:px-6 py-2 lg:py-3">
          Get Started
        </a>
      </div>

      <div class="flex md:hidden items-center gap-3">
        <!-- Mobile Theme Toggle Button -->
        <button 
          (click)="toggleTheme()"
          class="relative z-10 p-2 rounded-full transition-all duration-300 focus:outline-none"
          [class.bg-tc-dark]="isDarkMode() === 'dark'"
          [class.bg-tc-light-gray]="isDarkMode() === 'light'"
          [attr.aria-label]="isDarkMode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
          <svg 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="2" 
            stroke="currentColor" 
            class="w-5 h-5"
            [class.text-tc-orange]="isDarkMode() === 'dark'"
            [class.hidden]="isDarkMode() === 'light'">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
          <svg 
            xmlns="http://www.w3.org/2000/svg" 
            fill="none" 
            viewBox="0 0 24 24" 
            stroke-width="2" 
            stroke="currentColor" 
            class="w-5 h-5"
            [class.text-tc-dark]="isDarkMode() === 'light'"
            [class.hidden]="isDarkMode() === 'dark'">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        </button>

        <button 
          (click)="toggleMobileMenu()"
          class="relative z-10 p-2 focus:outline-none"
          [class.text-tc-white]="isDarkMode() === 'dark'"
          [class.text-tc-dark]="isDarkMode() === 'light'"
          [attr.aria-expanded]="isMobileMenuOpen()"
          aria-label="Toggle navigation menu">
          <div class="w-6 h-5 relative flex flex-col justify-between">
            <span 
              class="w-full h-0.5 bg-current transition-all duration-300 origin-left"
              [class.rotate-45]="isMobileMenuOpen()"
              [class.translate-y-0]="isMobileMenuOpen()"></span>
            <span 
              class="w-full h-0.5 bg-current transition-all duration-300"
              [class.opacity-0]="isMobileMenuOpen()"></span>
            <span 
              class="w-full h-0.5 bg-current transition-all duration-300 origin-left"
              [class.-rotate-45]="isMobileMenuOpen()"
              [class.-translate-y-0]="isMobileMenuOpen()"></span>
          </div>
        </button>
      </div>
    </div>
  </nav>

  <div 
    class="fixed inset-0 md:hidden transition-all duration-500 flex flex-col items-center justify-center"
    [class.bg-tc-black]="isDarkMode() === 'dark'"
    [class.bg-white]="isDarkMode() === 'light'"
    [class.opacity-100]="isMobileMenuOpen()"
    [class.pointer-events-auto]="isMobileMenuOpen()"
    [class.opacity-0]="!isMobileMenuOpen()"
    [class.pointer-events-none]="!isMobileMenuOpen()">
    
    <nav class="flex flex-col items-center gap-6 sm:gap-8">
      @for (link of navLinks; track link.label; let i = $index) {
        <a 
          [href]="link.href"
          (click)="scrollToSection(link.href)"
          class="text-2xl sm:text-3xl font-semibold transition-colors duration-300 hover:text-tc-orange"
          [class.text-tc-white]="isDarkMode() === 'dark'"
          [class.text-tc-dark]="isDarkMode() === 'light'"
          [style.animation-delay.ms]="i * 100">
          {{ link.label }}
        </a>
      }
      <a 
        href="#contact" 
        (click)="scrollToSection('#contact')"
        class="btn-primary mt-4 text-sm sm:text-base px-6 sm:px-8 py-3 sm:py-4">
        Get Started
      </a>
    </nav>
  </div>
</header>
